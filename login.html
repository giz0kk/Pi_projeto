<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EcoColeta</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth login">

  <img src="img/logo telas.png" class="logo">

  <div class="container">
    <h2>Bem-vindo ao <span class="verde">EcoColeta</span></h2>

    <input type="email" placeholder="Digite seu e-mail">
    <input type="password" placeholder="Digite sua senha">

    <p class="link" onclick="window.location.href='recuperar.html'">
      Esqueceu a senha?
    </p>

    <a href="tela-inicia.html">
      <button class="btn-verde">Entrar</button>
    </a>

    <button class="btn-borda"
      onclick="window.location.href='cadastro.html'">
      Cadastre-se
    </button>
  </div>

  <script src="premios.js"></script>
  <script src="sistema.js"></script>
</body>
</html>
