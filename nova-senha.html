<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Senha - EcoColeta</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth nova-senha">

  <img src="img/logo telas.png" alt="Logo" class="logo">

  <div class="container">

    <h2>Defina sua nova senha</h2>

    <p class="subtitulo">Crie uma nova senha</p>

    <input type="password" placeholder="Nova senha">

    <div class="regras-senha">
      <p>• Pelo menos uma letra minúscula</p>
      <p>• Pelo menos uma letra maiúscula</p>
      <p>• Entre 8 e 16 caracteres</p>
      <p>• Use letras, números e pontuação comum</p>
    </div>

    <a href="senha-criada.html">
      <button class="btn-verde">Continuar</button>
    </a>

  </div>

  <script src="premios.js"></script>
  <script src="sistema.js"></script>
</body>
</html>
