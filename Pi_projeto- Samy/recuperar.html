<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - EcoColeta</title>  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">  <link rel="stylesheet" href="premios.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="notif-popup.css">
</head>

<body class="auth recuperar">

  <img src="Imagens/logo telas.png" class="logo">

  <div class="container">
    <h2>Redefinir Senha</h2>

    <p class="descricao">
      Digite seu e-mail para receber o código de redefinição
    </p>

    <input id="resetEmail" type="email" placeholder="Digite seu e-mail">
    <span class="field-error" id="resetEmailError"></span>

    <button class="btn-verde" type="button" onclick="sendResetCode()">Continuar</button>
  </div>

  <script>
    function showError(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (input) input.classList.add('input-error');
      if (error) error.textContent = message;
    }

    function clearError(id) {
      const input = document.getElementById(id);
      if (input) input.classList.remove('input-error');
    }

    function sendResetCode() {
      clearError('resetEmail');
      const email = document.getElementById('resetEmail').value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email) {
        showError('resetEmail', 'resetEmailError', 'Digite seu e-mail.');
        return;
      }

      if (!emailPattern.test(email)) {
        showError('resetEmail', 'resetEmailError', 'Digite um e-mail válido.');
        return;
      }

      const resetCode = Math.floor(100000 + Math.random() * 900000).toString();
      sessionStorage.setItem('resetEmail', email);
      sessionStorage.setItem('resetCode', resetCode);
      sessionStorage.setItem('resetVerified', 'false');
      console.log('Código de redefinição:', resetCode);

      window.location.href = 'verificacao.html';
    }
  </script>
</body>
</html>
