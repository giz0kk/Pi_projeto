<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação - EcoColeta</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="premios.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="notif-popup.css">
  <style>
    .auth .container {
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 32px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin: 0 auto;
      display: block;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
    }

    .auth .container h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1E3A8A;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .auth .container .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .auth .logo-container {
      margin-bottom: 20px;
    }

    .auth .logo-container img {
      width: 140px;
      height: auto;
      object-fit: contain;
    }

    .text {
      color: #475569;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
      font-weight: 400;
    }

    .text strong {
      color: #1E3A8A;
      font-weight: 600;
    }

    .codigo {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 32px 0;
      flex-wrap: wrap;
    }

    .code-digit {
      width: 50px;
      height: 56px;
      border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
      color: #1E3A8A;
    }

    .code-digit::placeholder {
      color: #cbd5e1;
    }

    .code-digit:focus {
      outline: none;
      border-color: #2E7D32;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
      transform: scale(1.05);
    }

    .code-digit:hover:not(:focus) {
      border-color: #cbd5e1;
    }

    .field-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: block;
      min-height: 20px;
      font-weight: 500;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tempo {
      color: #64748b;
      font-size: 13px;
      margin: 16px 0;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 125, 50, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-verde {
      background: linear-gradient(135deg, #8FFFC7 0%, #7fd9b5 100%);
      color: #0f2c21;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(143, 255, 199, 0.3);
      margin-top: 24px;
    }

    .btn-verde:hover {
      box-shadow: 0 8px 25px rgba(143, 255, 199, 0.4);
    }

    .reenviar {
      color: #475569;
      font-size: 13px;
      margin-top: 20px;
      font-weight: 400;
    }

    .reenviar-link {
      color: #2E7D32;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .reenviar-link:hover:not(.disabled) {
      color: #1B5E20;
      text-decoration: underline;
    }

    .reenviar-link.disabled {
      color: #cbd5e1;
      cursor: default;
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .auth .container {
        padding: 32px 24px;
        max-width: 100%;
      }

      .auth .container h2 {
        font-size: 24px;
      }

      .codigo {
        gap: 10px;
      }

      .code-digit {
        width: 44px;
        height: 50px;
        font-size: 20px;
      }

      button {
        padding: 13px 16px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body class="auth verificacao">

  <script src="notif-popup.js"></script>

  <div class="auth logo-container">
    <img src="Imagens/logo telas.png" alt="EcoColeta Logo">
  </div>

  <div class="container">
    <h2>Verificar Código</h2>
    <p class="subtitle">Insira o código enviado para seu e-mail</p>

    <p class="text">
      O seu código de verificação foi enviado para <br>
      <strong id="resetEmailDisplay"></strong>
    </p>

    <div class="codigo">
      <input class="code-digit" id="digit1" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit2" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit3" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit4" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit5" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit6" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
    </div>
    <span class="field-error" id="codeError"></span>

    <p class="tempo" id="countdownText">Aguarde 51 segundos para reenviar.</p>

    <button class="btn-verde" type="button" onclick="verifyResetCode()">Verificar Código</button>

    <p class="reenviar">
      Não recebeu o código?
      <span class="reenviar-link disabled" id="resendLink" onclick="resendCode()">Reenviar agora</span>
    </p>

  </div>

  <script>
    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function getStoredCode() {
      return sessionStorage.getItem('resetCode') || '';
    }

    let resendTimeout = null;
    let resendAllowed = false;

    function verifyResetCode() {
      const digits = Array.from(document.querySelectorAll('.code-digit')).map((input) => input.value.trim());
      const code = digits.join('');
      const storedCode = getStoredCode();

      if (code.length !== 6) {
        setText('codeError', 'Digite o código completo.');
        return;
      }

      if (code !== storedCode) {
        setText('codeError', 'Código incorreto. Verifique o e-mail e tente novamente.');
        return;
      }

      sessionStorage.setItem('resetVerified', 'true');
      window.location.href = 'nova-senha.html';
    }

    function setResendState(allowed) {
      const resendLink = document.getElementById('resendLink');
      if (!resendLink) return;
      resendAllowed = allowed;
      if (allowed) {
        resendLink.classList.remove('disabled');
      } else {
        resendLink.classList.add('disabled');
      }
    }

    function updateCountdownText(seconds) {
      const countdownText = document.getElementById('countdownText');
      if (!countdownText) return;
      if (seconds > 0) {
        countdownText.textContent = `Aguarde ${seconds} segundo${seconds === 1 ? '' : 's'} para reenviar.`;
      } else {
        countdownText.textContent = 'Você pode reenviar o código agora.';
      }
    }

    function startResendCountdown(duration) {
      let remaining = duration;
      setResendState(false);
      updateCountdownText(remaining);

      if (resendTimeout) {
        clearInterval(resendTimeout);
      }

      resendTimeout = setInterval(() => {
        remaining -= 1;
        updateCountdownText(remaining);
        if (remaining <= 0) {
          clearInterval(resendTimeout);
          resendTimeout = null;
          setResendState(true);
        }
      }, 1000);
    }

    function resendCode() {
      const email = sessionStorage.getItem('resetEmail');
      if (!email) {
        window.location.href = 'recuperar.html';
        return;
      }
      if (!resendAllowed) {
        setText('codeError', 'Aguarde o tempo de reenviar terminar.');
        return;
      }
      const resetCode = Math.floor(100000 + Math.random() * 900000).toString();
      sessionStorage.setItem('resetCode', resetCode);
      sessionStorage.setItem('resetVerified', 'false');
      console.log('Novo código de redefinição:', resetCode);
      setText('codeError', 'Novo código enviado. Verifique seu e-mail.');
      startResendCountdown(51);
    }

    function setupCodeInputs() {
      const inputs = Array.from(document.querySelectorAll('.code-digit'));
      inputs.forEach((input, index) => {
        input.addEventListener('input', (event) => {
          const value = event.target.value.replace(/[^0-9]/g, '');
          event.target.value = value;
          if (value && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Backspace' && !event.target.value && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const email = sessionStorage.getItem('resetEmail');
      const code = getStoredCode();
      if (!email || !code) {
        window.location.href = 'recuperar.html';
        return;
      }
      setText('resetEmailDisplay', email);
      setupCodeInputs();
      startResendCountdown(51);
    });
  </script>
</body>
</html>
